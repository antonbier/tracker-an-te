server {
    listen 80;
    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/css application/javascript image/svg+xml;

    # ── PWA: Service Worker — must be served with correct MIME + no cache ──
    location = /sw.js {
        root /usr/share/nginx/html;
        add_header Content-Type "application/javascript";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── PWA: Manifest — no cache so updates are picked up immediately ──────
    location = /manifest.json {
        root /usr/share/nginx/html;
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── PWA: Icons ──────────────────────────────────────────────────────────
    location /icons/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # ── Locale JSON — no cache ───────────────────────────────────────────────
    location /locales/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/json; charset=utf-8";
    }

    # ── JS modules — short cache, re-validate ───────────────────────────────
    location /js/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, must-revalidate";
        add_header Content-Type "application/javascript";
        try_files $uri =404;
    }

    # ── API + health → Backend ───────────────────────────────────────────────
    location = /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(api|docs|openapi\.json) {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Frontend SPA (catch-all) — short cache for HTML ─────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
