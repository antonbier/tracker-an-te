server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Svelte build assets (hashed filenames → long cache) ──────────────
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── PWA files — always fresh ──────────────────────────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Icons & static assets ─────────────────────────────────────────────
    location /icons/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── API Proxy → Backend (fixes 405 / CORS on local) ──────────────────
    # All /api/* requests are forwarded to the backend container.
    # The browser never talks directly to the backend — Nginx proxies it.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # Allow all methods (POST, PUT, DELETE, PATCH) — fixes 405
        proxy_method       $request_method;
    }

    # ── Health endpoint passthrough ───────────────────────────────────────
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # ── SPA Fallback — all routes → index.html ────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
