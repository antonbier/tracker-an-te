server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ──────────────────────────────────────────────────────
    # X-Content-Type-Options: prevent MIME sniffing
    add_header X-Content-Type-Options    "nosniff"            always;

    # X-Frame-Options: prevent clickjacking
    add_header X-Frame-Options           "SAMEORIGIN"         always;

    # Referrer-Policy
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Content Security Policy
    # - default-src self: only load from same origin
    # - script-src self unsafe-inline: Svelte inline scripts
    # - connect-src self: API calls to same origin (via Nginx proxy)
    # - img-src self data: icons + PWA
    # - style-src self unsafe-inline: Tailwind inline styles
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; manifest-src 'self'; worker-src 'self';"
        always;

    # Cross-Origin-Resource-Policy
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Cross-Origin-Opener-Policy (required for WebAuthn/Passkeys)
    add_header Cross-Origin-Opener-Policy   "same-origin"  always;

    # HSTS is set by Zoraxy/reverse proxy (not here — only valid over HTTPS)
    # Zoraxy should add: Strict-Transport-Security: max-age=63072000; includeSubDomains

    # ── Svelte build assets (hashed filenames → long cache) ──────────────────
    location /_app/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── PWA files — always fresh ──────────────────────────────────────────────
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
        add_header Content-Type "application/javascript";
    }

    location = /manifest.webmanifest {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/manifest+json";
    }

    location = /registerSW.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Content-Type "application/javascript";
    }

    # ── Icons ─────────────────────────────────────────────────────────────────
    location /icons/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── API Proxy → Backend ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health passthrough ────────────────────────────────────────────────────
    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # ── SPA Fallback ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
