name: Build & Deploy Svelte to here.now (DISABLED)
# Deployment via here.now eingestellt.
# WanderSuite läuft on-prem auf Unraid via Docker Compose.
# Externer Zugriff via Zoraxy Reverse Proxy + eigene Domain geplant.
# Zum Reaktivieren: 'on: push: branches: [main]' wieder einkommentieren.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to deploy to here.now'
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'YES' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: svelte
        run: npm install

      - name: Build
        working-directory: svelte
        run: npm run build
        env:
          NODE_ENV: production

      - name: Copy assets into dist
        run: |
          mkdir -p svelte/dist/icons
          cp frontend/icons/icon-192.png svelte/dist/icons/
          cp frontend/icons/icon-512.png svelte/dist/icons/

      - name: Install here.now CLI
        run: |
          sudo apt-get install -y jq
          npm install -g skills
          npx skills add heredotnow/skill --skill here-now -g --yes

      - name: Deploy to here.now
        env:
          HERENOW_API_KEY: ${{ secrets.HERENOW_API_KEY }}
        run: |
          bash ~/.agents/skills/here-now/scripts/publish.sh ./svelte/dist \
            --client github-actions
