services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8766}:8000"
    environment:
      - DB_PATH=/data/tracker.db
      - APP_SECRET=${APP_SECRET:-wandersuite-change-me}
    volumes:
      - ./data:/data
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PORT:-8765}:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - tracker-net

networks:
  tracker-net:
    driver: bridge
