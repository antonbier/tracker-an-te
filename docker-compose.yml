services:

  # ─────────────────────────────────────────
  # Backend — FastAPI + SQLite
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wandersuite-backend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - APP_SECRET=${APP_SECRET}
      - DB_PATH=/app/data/tracker.db
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/wandersuite/data}:/app/data
    ports:
      - "${BACKEND_PORT:-8766}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────
  # Frontend — Nginx serviert Svelte dist/
  # Kein Build-Step im Container — dist/ wird
  # lokal per `npm run build` erzeugt und per
  # Volume eingebunden.
  # ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: wandersuite-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./svelte/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HOST_PORT:-8765}:80"
