services:

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wandersuite-beta-backend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - APP_SECRET=${APP_SECRET}
      - DB_PATH=/app/data/tracker.db
      - WANDERSUITE_CHANNEL=beta
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET muss in .env gesetzt sein}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-WanderSuite}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-http://localhost:8767}
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/wandersuite-beta/data}:/app/data
    ports:
      - "${BACKEND_PORT:-8768}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: wandersuite-beta-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8767}:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
