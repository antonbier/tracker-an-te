services:

  # ─────────────────────────────────────────
  # Backend — FastAPI + SQLite (BETA)
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wandersuite-beta-backend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - APP_SECRET=${APP_SECRET}
      - DB_PATH=/app/data/tracker.db
      - WANDERSUITE_CHANNEL=beta
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/wandersuite-beta/data}:/app/data
    ports:
      - "${BACKEND_PORT:-8768}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────
  # Frontend — Multi-Stage Build (BETA)
  # Includes BUILD_DATE for version display.
  #
  # Build + start:
  #   docker compose build --build-arg BUILD_DATE="$(date '+%Y-%m-%d %H:%M')"
  #   docker compose up -d
  #
  # Or combined (recommended):
  #   BUILD_DATE="$(date '+%Y-%m-%d %H:%M')" docker compose up -d --build
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: wandersuite-beta-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8767}:80"
