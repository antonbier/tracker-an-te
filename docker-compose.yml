services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    environment:
      - DB_PATH=/data/tracker.db
    volumes:
      - ./data:/data
    networks:
      - tracker-net

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - tracker-net

networks:
  tracker-net:
    driver: bridge
