services:

  # ─────────────────────────────────────────
  # Backend — FastAPI + SQLite
  # ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wandersuite-backend
    restart: unless-stopped
    environment:
      - TZ=${TZ:-Europe/Rome}
      - APP_SECRET=${APP_SECRET}
      - DB_PATH=/app/data/tracker.db
    volumes:
      - ${DATA_DIR:-/mnt/user/appdata/wandersuite/data}:/app/data
    ports:
      - "${BACKEND_PORT:-8766}:8000"   # direct API access (Swagger, Railway)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────
  # Frontend — Multi-Stage Build
  # Stage 1: Node 20 builds Svelte → dist/
  # Stage 2: Nginx serves dist/ + proxies /api/ → backend
  #
  # Update workflow: git pull && docker compose up -d --build
  # Docker cache skips unchanged layers automatically.
  # ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: wandersuite-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-8765}:80"
