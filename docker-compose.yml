# WanderSuite — Docker Compose
#
# Quickstart:
#   cp .env.example .env   # konfigurieren
#   docker compose up -d --build
#
# Update:
#   git pull && docker compose up -d --build
#
# Ports (konfigurierbar via .env):
#   Frontend (Nginx):  http://HOST:${HOST_PORT:-8765}
#   Backend  (FastAPI): http://HOST:${BACKEND_PORT:-8766}  (direkt vom Browser)

services:

  # ── Backend (FastAPI + APScheduler) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8766}:8000"
    environment:
      # Zeitzone für APScheduler-Cronjob (täglich 07:00 Uhr)
      - TZ=${TZ:-Europe/Rome}
      # SQLite-Datenbank innerhalb des Containers (gemounteter Volume-Pfad)
      - DB_PATH=/app/data/tracker.db
      # AES-Fernet Encryption Key für gespeicherte API Keys
      - APP_SECRET=${APP_SECRET:-wandersuite-change-me}
    volumes:
      # Persistente Daten: SQLite DB überlebt Container-Neustarts
      - ${DATA_DIR:-./data}:/app/data
    networks:
      - tracker-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (Nginx static + reverse proxy) ─────────────────────────────────
  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8765}:80"
    environment:
      - TZ=${TZ:-Europe/Rome}
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - tracker-net

networks:
  tracker-net:
    driver: bridge
